<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#060E1A"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2744" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#F5D77A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="white">Smart Home Wiring — New Construction vs Retrofit</text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8B9DC3">Pre-wire during construction and save ₹4–8 Lakh | Data from 300+ GMHS installations</text>

  <!-- Left: During Construction -->
  <rect x="60" y="110" width="500" height="280" rx="12" fill="#0A1628" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="310" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#4ADE80">During Construction</text>

  <!-- Cable types with costs -->
  <rect x="85" y="160" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="105" cy="178" r="6" fill="#4ADE80"/>
  <text x="120" y="175" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">KNX Bus Cable (2x2x0.8mm)</text>
  <text x="120" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Full villa wiring</text>
  <text x="510" y="182" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#4ADE80">₹60K–1.2L</text>

  <rect x="85" y="204" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="105" cy="222" r="6" fill="#3B82F6"/>
  <text x="120" y="219" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">Cat6A Shielded (20 points)</text>
  <text x="120" y="234" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Cameras, APs, TVs, intercoms</text>
  <text x="510" y="226" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#4ADE80">₹25K–40K</text>

  <rect x="85" y="248" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="105" cy="266" r="6" fill="#A855F7"/>
  <text x="120" y="263" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">Speaker Wire 14AWG (10 zones)</text>
  <text x="120" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Multi-room audio + Atmos</text>
  <text x="510" y="270" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#4ADE80">₹15K–25K</text>

  <rect x="85" y="292" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="105" cy="310" r="6" fill="#F59E0B"/>
  <text x="120" y="307" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">HDMI/Fiber Conduit (32mm)</text>
  <text x="120" y="322" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">TV walls + projector runs</text>
  <text x="510" y="314" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#4ADE80">₹8K–15K</text>

  <rect x="85" y="336" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="105" cy="354" r="6" fill="#EC4899"/>
  <text x="120" y="351" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">Curtain Motor Power (3x1.5mm)</text>
  <text x="120" y="366" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">8–12 motorized blinds</text>
  <text x="510" y="358" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#4ADE80">₹12K–20K</text>

  <!-- Total -->
  <rect x="85" y="380" width="450" height="3" rx="1" fill="#4ADE80" opacity="0.3"/>
  <text x="310" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4ADE80">TOTAL: ₹1.2L – ₹2.2L (5BHK Villa)</text>

  <!-- Right: Retrofit -->
  <rect x="640" y="110" width="500" height="280" rx="12" fill="#0A1628" stroke="#F87171" stroke-width="1.5"/>
  <text x="890" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#F87171">Retrofit (After Finishing)</text>

  <rect x="665" y="160" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="685" cy="178" r="6" fill="#4ADE80"/>
  <text x="700" y="175" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">KNX Bus Cable</text>
  <text x="700" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Wall breaking + replastering + repainting</text>
  <text x="1090" y="182" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F87171">₹3L–5L</text>

  <rect x="665" y="204" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="685" cy="222" r="6" fill="#3B82F6"/>
  <text x="700" y="219" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">Cat6A Networking</text>
  <text x="700" y="234" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Surface conduit or wall chasing</text>
  <text x="1090" y="226" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F87171">₹1L–1.8L</text>

  <rect x="665" y="248" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="685" cy="266" r="6" fill="#A855F7"/>
  <text x="700" y="263" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">Speaker Wire</text>
  <text x="700" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Ceiling access + patching</text>
  <text x="1090" y="270" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F87171">₹80K–1.4L</text>

  <rect x="665" y="292" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="685" cy="310" r="6" fill="#F59E0B"/>
  <text x="700" y="307" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">HDMI/Fiber Conduit</text>
  <text x="700" y="322" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Surface-mounted or limited routing</text>
  <text x="1090" y="314" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F87171">₹50K–90K</text>

  <rect x="665" y="336" width="450" height="36" rx="6" fill="#0F1B2E"/>
  <circle cx="685" cy="354" r="6" fill="#EC4899"/>
  <text x="700" y="351" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white">Curtain Motor Power</text>
  <text x="700" y="366" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Pelmet access + wiring</text>
  <text x="1090" y="358" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F87171">₹60K–1L</text>

  <rect x="665" y="380" width="450" height="3" rx="1" fill="#F87171" opacity="0.3"/>
  <text x="890" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F87171">TOTAL: ₹5.9L – ₹10.1L (5BHK Villa)</text>

  <!-- Savings callout -->
  <rect x="350" y="430" width="500" height="60" rx="12" fill="#0F1B2E" stroke="#D4A843" stroke-width="2"/>
  <text x="600" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#goldGrad)">You Save ₹4–8 Lakh</text>
  <text x="600" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B9DC3">by planning automation wiring before your electrician starts first-fix</text>

  <!-- Timeline at bottom -->
  <rect x="0" y="520" width="1200" height="110" fill="#0A1628"/>
  <text x="600" y="548" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="url(#goldGrad)">Critical Timeline: When to Involve Automation Consultant</text>

  <!-- Timeline points -->
  <line x1="120" y1="580" x2="1080" y2="580" stroke="#2A3A5C" stroke-width="2"/>

  <circle cx="200" cy="580" r="8" fill="#3B82F6"/>
  <text x="200" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#3B82F6">Design Stage</text>
  <text x="200" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">Scope + planning</text>

  <circle cx="440" cy="580" r="8" fill="#4ADE80"/>
  <text x="440" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#4ADE80">First-Fix Electrical</text>
  <text x="440" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">Wire pulling (2-3 weeks)</text>

  <circle cx="680" cy="580" r="8" fill="#8B9DC3"/>
  <text x="680" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#8B9DC3">Plastering</text>
  <text x="680" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5A6B8A">Wait (no action)</text>

  <circle cx="880" cy="580" r="8" fill="#D4A843"/>
  <text x="880" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#D4A843">Second-Fix</text>
  <text x="880" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">Devices + programming</text>

  <circle cx="1020" cy="580" r="8" fill="#F5D77A"/>
  <text x="1020" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#F5D77A">Handover</text>
  <text x="1020" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">Commissioning</text>

  <!-- Arrow indicating critical window -->
  <rect x="160" y="610" width="320" height="16" rx="3" fill="#4ADE80" opacity="0.15"/>
  <text x="320" y="622" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#4ADE80">← CRITICAL WINDOW: Plan before first-fix starts →</text>

  <!-- Branding -->
  <text x="600" y="625" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5A6B8A">growmoresolutions.com — 300+ installations | 12 cities | 15+ years</text>
</svg>
