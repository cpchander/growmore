      <rect x="198" y="143" width="35" height="28" rx="2"/><rect x="243" y="143" width="35" height="28" rx="2"/><rect x="288" y="143" width="35" height="28" rx="2"/>
      <rect x="198" y="186" width="35" height="28" rx="2"/><rect x="243" y="186" width="35" height="28" rx="2"/><rect x="288" y="186" width="35" height="28" rx="2"/>
      <rect x="198" y="229" width="35" height="28" rx="2"/><rect x="243" y="229" width="35" height="28" rx="2"/><rect x="288" y="229" width="35" height="28" rx="2"/>
      <rect x="198" y="272" width="35" height="28" rx="2"/><rect x="243" y="272" width="35" height="28" rx="2"/><rect x="288" y="272" width="35" height="28" rx="2"/>
      <rect x="198" y="315" width="35" height="28" rx="2"/><rect x="243" y="315" width="35" height="28" rx="2"/><rect x="288" y="315" width="35" height="28" rx="2"/>
      <rect x="198" y="358" width="35" height="28" rx="2"/><rect x="243" y="358" width="35" height="28" rx="2"/><rect x="288" y="358" width="35" height="28" rx="2"/>
      <rect x="198" y="401" width="35" height="28" rx="2"/><rect x="243" y="401" width="35" height="28" rx="2"/><rect x="288" y="401" width="35" height="28" rx="2"/>
      <rect x="198" y="444" width="35" height="28" rx="2"/><rect x="243" y="444" width="35" height="28" rx="2"/><rect x="288" y="444" width="35" height="28" rx="2"/>
