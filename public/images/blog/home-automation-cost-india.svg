<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060E1A"/>
      <stop offset="100%" stop-color="#0F1D33"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#F0C75E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#D4A843" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="470" x2="1200" y2="470"/>
  </g>
  <!-- House outline -->
  <g transform="translate(120, 100)" opacity="0.9">
    <polygon points="200,20 380,140 380,380 20,380 20,140" fill="none" stroke="#D4A843" stroke-width="2.5"/>
    <polygon points="200,20 20,140 380,140" fill="none" stroke="#D4A843" stroke-width="2.5"/>
    <!-- Door -->
    <rect x="160" y="240" width="80" height="140" rx="4" fill="none" stroke="#F0C75E" stroke-width="2"/>
    <circle cx="225" cy="315" r="5" fill="#D4A843"/>
    <!-- Windows -->
    <rect x="50" y="180" width="80" height="60" rx="3" fill="#D4A843" fill-opacity="0.15" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="90" y1="180" x2="90" y2="240" stroke="#D4A843" stroke-width="1"/>
    <line x1="50" y1="210" x2="130" y2="210" stroke="#D4A843" stroke-width="1"/>
    <rect x="270" y="180" width="80" height="60" rx="3" fill="#D4A843" fill-opacity="0.15" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="310" y1="180" x2="310" y2="240" stroke="#D4A843" stroke-width="1"/>
    <line x1="270" y1="210" x2="350" y2="210" stroke="#D4A843" stroke-width="1"/>
    <!-- Smart indicators -->
    <circle cx="90" cy="170" r="8" fill="#3B82F6" fill-opacity="0.8"/>
    <circle cx="310" cy="170" r="8" fill="#3B82F6" fill-opacity="0.8"/>
    <circle cx="200" cy="230" r="8" fill="#D4A843" fill-opacity="0.8"/>
  </g>
  <!-- Cost bars chart -->
  <g transform="translate(580, 140)">
    <!-- Axis -->
    <line x1="0" y1="350" x2="500" y2="350" stroke="#1A2744" stroke-width="2"/>
    <!-- Bar: Basic -->
    <rect x="40" y="250" width="100" height="100" rx="6" fill="#D4A843" fill-opacity="0.25" stroke="#D4A843" stroke-width="1.5"/>
    <text x="90" y="290" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="18" font-weight="700">₹2-5L</text>
    <text x="90" y="380" text-anchor="middle" fill="#8B9BB4" font-family="system-ui" font-size="13">Basic</text>
    <!-- Bar: Premium -->
    <rect x="200" y="150" width="100" height="200" rx="6" fill="#D4A843" fill-opacity="0.4" stroke="#D4A843" stroke-width="1.5"/>
    <text x="250" y="200" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="18" font-weight="700">₹5-15L</text>
    <text x="250" y="380" text-anchor="middle" fill="#8B9BB4" font-family="system-ui" font-size="13">Premium</text>
    <!-- Bar: Luxury -->
    <rect x="360" y="50" width="100" height="300" rx="6" fill="url(#gold1)" fill-opacity="0.5" stroke="#D4A843" stroke-width="1.5"/>
    <text x="410" y="100" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="18" font-weight="700">₹15-50L+</text>
    <text x="410" y="380" text-anchor="middle" fill="#8B9BB4" font-family="system-ui" font-size="13">Luxury</text>
  </g>
  <!-- Title -->
  <text x="600" y="580" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700" opacity="0.9">Home Automation Cost Guide — India 2026</text>
</svg>
