<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0F1B2D" stroke-width="1"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060E1A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#F1C969"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A6E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#060E1A" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top brand bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#goldGrad)"/>

  <!-- Title -->
  <text x="60" y="80" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">Home Theater &amp; AV Automation Cost</text>
  <text x="60" y="115" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#D4A843">India 2026 — 300+ GMHS Installations</text>

  <!-- Tier label header -->
  <text x="60" y="170" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#94A3B8" letter-spacing="2">CONFIGURATION TIERS &amp; TYPICAL SPEND</text>

  <!-- Tier 1: Entry Media Room -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="250" height="160" rx="12" fill="#0F1B2D" stroke="#1E3A5F" stroke-width="1"/>
    <text x="20" y="35" font-family="Inter" font-size="13" font-weight="700" fill="#D4A843" letter-spacing="1">ENTRY MEDIA ROOM</text>
    <text x="20" y="65" font-family="Inter" font-size="22" font-weight="800" fill="#FFFFFF">5.1 / 5.1.2</text>
    <text x="20" y="100" font-family="Inter" font-size="26" font-weight="800" fill="#D4A843">₹3–8 L</text>
    <text x="20" y="130" font-family="Inter" font-size="13" fill="#94A3B8">3BHK family rooms</text>
    <text x="20" y="150" font-family="Inter" font-size="13" fill="#94A3B8">Casual viewing</text>
  </g>

  <!-- Tier 2: Premium Media Room -->
  <g transform="translate(330, 200)">
    <rect x="0" y="0" width="250" height="160" rx="12" fill="#0F1B2D" stroke="#1E3A5F" stroke-width="1"/>
    <text x="20" y="35" font-family="Inter" font-size="13" font-weight="700" fill="#D4A843" letter-spacing="1">PREMIUM MEDIA ROOM</text>
    <text x="20" y="65" font-family="Inter" font-size="22" font-weight="800" fill="#FFFFFF">5.1.4 / 7.1.2</text>
    <text x="20" y="100" font-family="Inter" font-size="26" font-weight="800" fill="#D4A843">₹8–18 L</text>
    <text x="20" y="130" font-family="Inter" font-size="13" fill="#94A3B8">4BHK media rooms</text>
    <text x="20" y="150" font-family="Inter" font-size="13" fill="#94A3B8">Mixed-use lounges</text>
  </g>

  <!-- Tier 3: Dedicated Home Cinema -->
  <g transform="translate(600, 200)">
    <rect x="0" y="0" width="250" height="160" rx="12" fill="#0F1B2D" stroke="#D4A843" stroke-width="2"/>
    <text x="20" y="35" font-family="Inter" font-size="13" font-weight="700" fill="#D4A843" letter-spacing="1">DEDICATED CINEMA ★</text>
    <text x="20" y="65" font-family="Inter" font-size="22" font-weight="800" fill="#FFFFFF">7.1.4 / 9.1.6</text>
    <text x="20" y="100" font-family="Inter" font-size="26" font-weight="800" fill="#D4A843">₹18–60 L</text>
    <text x="20" y="130" font-family="Inter" font-size="13" fill="#94A3B8">Villas, dedicated rooms</text>
    <text x="20" y="150" font-family="Inter" font-size="13" fill="#94A3B8">Serious cinephiles</text>
  </g>

  <!-- Tier 4: Reference -->
  <g transform="translate(870, 200)">
    <rect x="0" y="0" width="270" height="160" rx="12" fill="#0F1B2D" stroke="#1E3A5F" stroke-width="1"/>
    <text x="20" y="35" font-family="Inter" font-size="13" font-weight="700" fill="#D4A843" letter-spacing="1">REFERENCE / THX-GRADE</text>
    <text x="20" y="65" font-family="Inter" font-size="22" font-weight="800" fill="#FFFFFF">9.1.6 / 13.1.6</text>
    <text x="20" y="100" font-family="Inter" font-size="26" font-weight="800" fill="#D4A843">₹60 L–2 Cr+</text>
    <text x="20" y="130" font-family="Inter" font-size="13" fill="#94A3B8">Luxury villas, farmhouses</text>
    <text x="20" y="150" font-family="Inter" font-size="13" fill="#94A3B8">Demo rooms</text>
  </g>

  <!-- Cost breakdown title -->
  <text x="60" y="410" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#94A3B8" letter-spacing="2">PREMIUM TIER COST DISTRIBUTION (₹25 L PROJECT)</text>

  <!-- Cost bar chart -->
  <g transform="translate(60, 425)">
    <!-- Speakers + amp -->
    <rect x="0" y="0" width="380" height="38" fill="#D4A843" rx="4"/>
    <text x="14" y="24" font-family="Inter" font-size="13" font-weight="700" fill="#0A1628">Speakers + Amp + Processor — 38%</text>

    <!-- Acoustic + Room -->
    <rect x="385" y="0" width="180" height="38" fill="#F1C969" rx="4"/>
    <text x="395" y="24" font-family="Inter" font-size="12" font-weight="700" fill="#0A1628">Acoustic — 18%</text>

    <!-- Display -->
    <rect x="570" y="0" width="180" height="38" fill="#7C9BC9" rx="4"/>
    <text x="580" y="24" font-family="Inter" font-size="12" font-weight="700" fill="#0A1628">Display — 18%</text>

    <!-- Control + Lighting -->
    <rect x="755" y="0" width="130" height="38" fill="#5577AA" rx="4"/>
    <text x="765" y="24" font-family="Inter" font-size="12" font-weight="700" fill="#FFFFFF">Control — 13%</text>

    <!-- Seating -->
    <rect x="890" y="0" width="90" height="38" fill="#3B5278" rx="4"/>
    <text x="900" y="24" font-family="Inter" font-size="12" font-weight="700" fill="#FFFFFF">Seats — 9%</text>

    <!-- Misc -->
    <rect x="985" y="0" width="55" height="38" fill="#1E3A5F" rx="4"/>
    <text x="995" y="24" font-family="Inter" font-size="11" font-weight="700" fill="#FFFFFF">Misc — 4%</text>
  </g>

  <!-- Footer -->
  <text x="60" y="595" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#D4A843">growmoresolutions.com</text>
  <text x="220" y="595" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94A3B8">— 300+ installations  |  12 cities  |  15+ years</text>

  <!-- Atmos icon (subtle) -->
  <g transform="translate(1050, 80)" opacity="0.7">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#D4A843" stroke-width="1"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#D4A843" stroke-width="1"/>
    <circle cx="0" cy="0" r="6" fill="#D4A843"/>
    <text x="0" y="48" text-anchor="middle" font-family="Inter" font-size="10" fill="#94A3B8" letter-spacing="2">DOLBY ATMOS</text>
  </g>
</svg>
