      <rect x="15" y="240" width="30" height="25" rx="2"/><rect x="55" y="240" width="30" height="25" rx="2"/><rect x="95" y="240" width="30" height="25" rx="2"/>
      <rect x="15" y="280" width="30" height="25" rx="2"/><rect x="55" y="280" width="30" height="25" rx="2"/><rect x="95" y="280" width="30" height="25" rx="2"/>
      <rect x="15" y="320" width="30" height="25" rx="2"/><rect x="55" y="320" width="30" height="25" rx="2"/><rect x="95" y="320" width="30" height="25" rx="2"/>
