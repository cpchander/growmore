<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#060E1A"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2744" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#F5D77A"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="white">Home Automation Cost in India 2026</text>
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8B9DC3">Real Pricing from 300+ Premium Installations by GMHS</text>

  <!-- Cost by Home Size - Bar Chart -->
  <text x="180" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="url(#goldGrad)">Cost by Home Size</text>

  <!-- 3BHK -->
  <text x="60" y="172" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">3 BHK</text>
  <rect x="110" y="160" width="100" height="18" rx="3" fill="#1A2744" stroke="#2A3A5C" stroke-width="0.5"/>
  <rect x="110" y="160" width="72" height="18" rx="3" fill="url(#goldGrad)" opacity="0.8"/>
  <text x="190" y="173" font-family="system-ui, sans-serif" font-size="10" fill="white">₹7.2L avg</text>

  <!-- 4BHK -->
  <text x="60" y="202" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">4 BHK</text>
  <rect x="110" y="190" width="200" height="18" rx="3" fill="#1A2744" stroke="#2A3A5C" stroke-width="0.5"/>
  <rect x="110" y="190" width="148" height="18" rx="3" fill="url(#goldGrad)" opacity="0.85"/>
  <text x="265" y="203" font-family="system-ui, sans-serif" font-size="10" fill="white">₹14.8L avg</text>

  <!-- 5BHK -->
  <text x="60" y="232" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">5 BHK</text>
  <rect x="110" y="220" width="280" height="18" rx="3" fill="#1A2744" stroke="#2A3A5C" stroke-width="0.5"/>
  <rect x="110" y="220" width="235" height="18" rx="3" fill="url(#goldGrad)" opacity="0.9"/>
  <text x="352" y="233" font-family="system-ui, sans-serif" font-size="10" fill="white">₹23.5L avg</text>

  <!-- 6BHK+ -->
  <text x="60" y="262" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">6 BHK+</text>
  <rect x="110" y="250" width="280" height="18" rx="3" fill="#1A2744" stroke="#2A3A5C" stroke-width="0.5"/>
  <rect x="110" y="250" width="280" height="18" rx="3" fill="url(#goldGrad)"/>
  <text x="397" y="263" font-family="system-ui, sans-serif" font-size="10" fill="white">₹38L avg</text>

  <!-- Scale -->
  <text x="110" y="285" font-family="system-ui, sans-serif" font-size="9" fill="#5A6B8A">₹0</text>
  <text x="250" y="285" font-family="system-ui, sans-serif" font-size="9" fill="#5A6B8A">₹20L</text>
  <text x="390" y="285" font-family="system-ui, sans-serif" font-size="9" fill="#5A6B8A">₹40L</text>

  <!-- Brand Cost Comparison - Right Side -->
  <text x="780" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="url(#goldGrad)">Cost per Automation Point</text>

  <!-- KNX -->
  <rect x="620" y="155" width="320" height="50" rx="8" fill="#0F1B2E" stroke="#1A2744" stroke-width="1"/>
  <text x="640" y="178" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">KNX</text>
  <text x="640" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Open Standard</text>
  <text x="870" y="178" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4ADE80">₹6K–12K</text>
  <text x="870" y="195" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">per point</text>
  <rect x="885" y="165" width="40" height="30" rx="4" fill="#4ADE80" opacity="0.15"/>
  <text x="905" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#4ADE80">$$</text>

  <!-- Control4 -->
  <rect x="620" y="215" width="320" height="50" rx="8" fill="#0F1B2E" stroke="#1A2744" stroke-width="1"/>
  <text x="640" y="238" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">Control4</text>
  <text x="640" y="255" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Best Balance</text>
  <text x="870" y="238" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FBBF24">₹8K–15K</text>
  <text x="870" y="255" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">per point</text>
  <rect x="885" y="225" width="40" height="30" rx="4" fill="#FBBF24" opacity="0.15"/>
  <text x="905" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FBBF24">$$$</text>

  <!-- Crestron -->
  <rect x="620" y="275" width="320" height="50" rx="8" fill="#0F1B2E" stroke="#1A2744" stroke-width="1"/>
  <text x="640" y="298" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">Crestron</text>
  <text x="640" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">Ultra-Premium</text>
  <text x="870" y="298" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F87171">₹15K–25K</text>
  <text x="870" y="315" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8B9DC3">per point</text>
  <rect x="885" y="285" width="40" height="30" rx="4" fill="#F87171" opacity="0.15"/>
  <text x="905" y="304" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#F87171">$$$$</text>

  <!-- Budget Split Pie-style visual -->
  <text x="180" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="url(#goldGrad)">Typical Budget Split</text>

  <!-- Stacked bar representing budget split -->
  <rect x="60" y="350" width="152" height="40" rx="4" fill="#D4A843"/>
  <text x="136" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#060E1A">Lighting 40%</text>

  <rect x="212" y="350" width="114" height="40" rx="4" fill="#3B82F6"/>
  <text x="269" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">AV 30%</text>

  <rect x="326" y="350" width="76" height="40" rx="4" fill="#8B5CF6"/>
  <text x="364" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">Security 20%</text>

  <rect x="402" y="350" width="38" height="40" rx="4" fill="#14B8A6"/>
  <text x="421" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white">10%</text>
  <text x="421" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#14B8A6">Climate</text>

  <!-- City-wise Pricing -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="url(#goldGrad)">Average 4BHK Project Cost by City</text>

  <!-- City cards -->
  <rect x="60" y="460" width="200" height="55" rx="8" fill="#0F1B2E" stroke="#D4A843" stroke-width="1" opacity="0.9"/>
  <text x="90" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Delhi NCR</text>
  <text x="90" y="503" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#D4A843">₹15.2 Lakh</text>
  <text x="230" y="493" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">KNX, Control4</text>

  <rect x="280" y="460" width="200" height="55" rx="8" fill="#0F1B2E" stroke="#2A3A5C" stroke-width="1"/>
  <text x="310" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Mumbai</text>
  <text x="310" y="503" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#D4A843">₹13.8 Lakh</text>
  <text x="450" y="493" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">Control4, Lutron</text>

  <rect x="500" y="460" width="200" height="55" rx="8" fill="#0F1B2E" stroke="#2A3A5C" stroke-width="1"/>
  <text x="530" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Bangalore</text>
  <text x="530" y="503" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#D4A843">₹14.5 Lakh</text>
  <text x="670" y="493" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">KNX, Crestron</text>

  <rect x="720" y="460" width="200" height="55" rx="8" fill="#0F1B2E" stroke="#2A3A5C" stroke-width="1"/>
  <text x="750" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Hyderabad</text>
  <text x="750" y="503" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#D4A843">₹12.8 Lakh</text>
  <text x="890" y="493" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">KNX, Control4</text>

  <rect x="940" y="460" width="200" height="55" rx="8" fill="#0F1B2E" stroke="#2A3A5C" stroke-width="1"/>
  <text x="970" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Pune</text>
  <text x="970" y="503" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#D4A843">₹11.5 Lakh</text>
  <text x="1110" y="493" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#8B9DC3">Control4</text>

  <!-- Stats bar at bottom -->
  <rect x="0" y="545" width="1200" height="85" fill="#0A1628"/>
  <rect x="0" y="545" width="1200" height="1" fill="#D4A843" opacity="0.3"/>

  <text x="150" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#goldGrad)">300+</text>
  <text x="150" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">Installations</text>

  <text x="380" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#goldGrad)">12</text>
  <text x="380" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">Cities Served</text>

  <text x="600" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#goldGrad)">15+</text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">Years Experience</text>

  <text x="820" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#goldGrad)">₹5–50L+</text>
  <text x="820" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">Cost Range</text>

  <text x="1050" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#goldGrad)">40/30/20/10</text>
  <text x="1050" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8B9DC3">Budget Split %</text>

  <!-- GMHS branding -->
  <text x="600" y="625" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5A6B8A">growmoresolutions.com — India's Most Experienced Home Automation Company</text>
</svg>
