      <rect x="395" y="275" width="28" height="22" rx="2"/><rect x="433" y="275" width="28" height="22" rx="2"/><rect x="471" y="275" width="28" height="22" rx="2"/>
      <rect x="395" y="310" width="28" height="22" rx="2"/><rect x="433" y="310" width="28" height="22" rx="2"/><rect x="471" y="310" width="28" height="22" rx="2"/>
      <rect x="395" y="345" width="28" height="22" rx="2"/><rect x="433" y="345" width="28" height="22" rx="2"/><rect x="471" y="345" width="28" height="22" rx="2"/>
      <rect x="395" y="380" width="28" height="22" rx="2"/><rect x="433" y="380" width="28" height="22" rx="2"/><rect x="471" y="380" width="28" height="22" rx="2"/>
      <rect x="395" y="415" width="28" height="22" rx="2"/><rect x="433" y="415" width="28" height="22" rx="2"/><rect x="471" y="415" width="28" height="22" rx="2"/>
