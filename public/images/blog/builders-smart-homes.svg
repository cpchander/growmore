      <text x="0" y="25" fill="#8B9BB4" font-family="system-ui" font-size="14">Premium pricing on smart units</text>
    </g>
    <!-- Stat 2 -->
    <g transform="translate(30, 155)">
      <text x="0" y="0" fill="#4CAF50" font-family="system-ui" font-size="42" font-weight="800">2x</text>
      <text x="0" y="25" fill="#8B9BB4" font-family="system-ui" font-size="14">Faster sales velocity</text>
    </g>
    <!-- Stat 3 -->
    <g transform="translate(30, 235)">
      <text x="0" y="0" fill="#3B82F6" font-family="system-ui" font-size="42" font-weight="800">30-50%</text>
      <text x="0" y="25" fill="#8B9BB4" font-family="system-ui" font-size="14">Lower per-unit cost at scale</text>
    </g>
    <!-- Stat 4 -->
    <g transform="translate(30, 315)">
      <text x="0" y="0" fill="#F97316" font-family="system-ui" font-size="42" font-weight="800">Top 3</text>
