<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060E1A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#F0C95C"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2744" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="200" r="180" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.1"/>
  <circle cx="900" cy="200" r="140" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.15"/>
  <circle cx="900" cy="200" r="100" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.2"/>

  <!-- Shield icon (center of circles) -->
  <path d="M900 120 L960 150 L960 210 Q960 260 900 290 Q840 260 840 210 L840 150 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.8"/>
  <path d="M880 195 L895 210 L920 180" fill="none" stroke="#D4A843" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Camera icon -->
  <g transform="translate(740, 130)" opacity="0.7">
    <rect x="0" y="8" width="36" height="24" rx="4" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <polygon points="36,14 52,6 52,38 36,30" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="14" cy="20" r="5" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  </g>

  <!-- Lock icon -->
  <g transform="translate(1020, 150)" opacity="0.7">
    <rect x="4" y="16" width="28" height="22" rx="3" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <path d="M10 16 V10 Q10 0 18 0 Q26 0 26 10 V16" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="18" cy="27" r="3" fill="#3B82F6" opacity="0.5"/>
  </g>

  <!-- Sensor icon -->
  <g transform="translate(840, 310)" opacity="0.7">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <path d="M8 18 Q18 5 28 18" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
    <path d="M11 22 Q18 14 25 22" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="18" cy="22" r="2" fill="#3B82F6"/>
  </g>

  <!-- Connection lines -->
  <line x1="775" y1="155" x2="845" y2="170" stroke="#D4A843" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="1020" y1="175" x2="960" y2="185" stroke="#D4A843" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="870" y1="310" x2="890" y2="290" stroke="#D4A843" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Title text -->
  <text x="60" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="white">
    Smart Home Security
  </text>
  <text x="60" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="white">
    Systems
    <tspan fill="#D4A843">India 2026</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8B9EC7" letter-spacing="0.5">
    CCTV • Access Control • Intrusion Detection • KNX Integration
  </text>

  <!-- Data visualization: Cost bars -->
  <g transform="translate(60, 260)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="13" fill="#D4A843" font-weight="600" letter-spacing="1">COST BY PROPERTY TYPE</text>

    <!-- 2BHK -->
    <text x="0" y="35" font-family="system-ui, sans-serif" font-size="12" fill="#8B9EC7">2BHK Apt</text>
    <rect x="100" y="23" width="80" height="18" rx="3" fill="#D4A843" opacity="0.25"/>
    <rect x="100" y="23" width="80" height="18" rx="3" fill="url(#goldGrad)" opacity="0.7"/>
    <text x="190" y="37" font-family="system-ui, sans-serif" font-size="11" fill="#D4A843">₹0.8–5L</text>

    <!-- 3BHK -->
    <text x="0" y="65" font-family="system-ui, sans-serif" font-size="12" fill="#8B9EC7">3BHK Apt</text>
    <rect x="100" y="53" width="160" height="18" rx="3" fill="#D4A843" opacity="0.25"/>
    <rect x="100" y="53" width="160" height="18" rx="3" fill="url(#goldGrad)" opacity="0.7"/>
    <text x="270" y="67" font-family="system-ui, sans-serif" font-size="11" fill="#D4A843">₹1.2–7L</text>

    <!-- Villa -->
    <text x="0" y="95" font-family="system-ui, sans-serif" font-size="12" fill="#8B9EC7">Villa</text>
    <rect x="100" y="83" width="300" height="18" rx="3" fill="#D4A843" opacity="0.25"/>
    <rect x="100" y="83" width="300" height="18" rx="3" fill="url(#goldGrad)" opacity="0.7"/>
    <text x="410" y="97" font-family="system-ui, sans-serif" font-size="11" fill="#D4A843">₹2–15L</text>

    <!-- Luxury -->
    <text x="0" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#8B9EC7">Luxury Villa</text>
    <rect x="100" y="113" width="450" height="18" rx="3" fill="#D4A843" opacity="0.25"/>
    <rect x="100" y="113" width="450" height="18" rx="3" fill="url(#goldGrad)" opacity="0.7"/>
    <text x="560" y="127" font-family="system-ui, sans-serif" font-size="11" fill="#D4A843">₹3.5–25L+</text>
  </g>

  <!-- Stats boxes -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="150" height="65" rx="6" fill="#0D1B2E" stroke="#1A2744" stroke-width="1"/>
    <text x="75" y="28" font-family="system-ui, sans-serif" font-size="22" fill="#D4A843" font-weight="700" text-anchor="middle">300+</text>
    <text x="75" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#8B9EC7" text-anchor="middle">Installations</text>

    <rect x="170" y="0" width="150" height="65" rx="6" fill="#0D1B2E" stroke="#1A2744" stroke-width="1"/>
    <text x="245" y="28" font-family="system-ui, sans-serif" font-size="22" fill="#D4A843" font-weight="700" text-anchor="middle">4 Layers</text>
    <text x="245" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#8B9EC7" text-anchor="middle">Integrated Security</text>

    <rect x="340" y="0" width="150" height="65" rx="6" fill="#0D1B2E" stroke="#1A2744" stroke-width="1"/>
    <text x="415" y="28" font-family="system-ui, sans-serif" font-size="22" fill="#D4A843" font-weight="700" text-anchor="middle">STQC</text>
    <text x="415" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#8B9EC7" text-anchor="middle">Certified Brands Only</text>

    <rect x="510" y="0" width="150" height="65" rx="6" fill="#0D1B2E" stroke="#1A2744" stroke-width="1"/>
    <text x="585" y="28" font-family="system-ui, sans-serif" font-size="22" fill="#D4A843" font-weight="700" text-anchor="middle">12 Cities</text>
    <text x="585" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#8B9EC7" text-anchor="middle">Pan-India Service</text>
  </g>

  <!-- Brand footer -->
  <rect x="0" y="560" width="1200" height="70" fill="#050C16" opacity="0.8"/>
  <line x1="0" y1="560" x2="1200" y2="560" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
  <text x="60" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#D4A843" font-weight="600">
    growmoresolutions.com
  </text>
  <text x="330" y="600" font-family="system-ui, sans-serif" font-size="13" fill="#5A6E8A">
    — 300+ installations | 12 cities | 15+ years
  </text>
</svg>
